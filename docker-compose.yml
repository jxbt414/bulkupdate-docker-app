services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bulkupdate-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: bulkupdate
      DB_USERNAME: bulkupdate
      DB_PASSWORD: secret
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bulkupdate

  mysql:
    image: mysql:8.0
    container_name: bulkupdate-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bulkupdate
      MYSQL_USER: bulkupdate
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bulkupdate

  redis:
    image: redis:alpine
    container_name: bulkupdate-redis
    restart: unless-stopped
    ports:
      - "6380:6379"  # host:container
    volumes:
      - redis_data:/data
    networks:
      - bulkupdate

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bulkupdate-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: bulkupdate
      DB_USERNAME: bulkupdate
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - app
      - mysql
      - redis
    networks:
      - bulkupdate

  node:
    image: node:20-alpine
    container_name: bulkupdate-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - bulkupdate

volumes:
  mysql_data:
  redis_data:

networks:
  bulkupdate:
    driver: bridge
