services:
    app:
      build: .
      ports:
        - "8080:80"
      volumes:
        - .:/var/www/html
      environment:
        APP_ENV: local
        DB_HOST: mysql
        DB_DATABASE: laravel
        DB_USERNAME: laravel
        DB_PASSWORD: secret
        REDIS_HOST: redis
      depends_on:
        - mysql
        - redis

    mysql:
      image: mysql:8.0
      ports:
        - "3306:3306"
      environment:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: laravel
        MYSQL_USER: laravel
        MYSQL_PASSWORD: secret
      volumes:
        - mysql_data:/var/lib/mysql

    redis:
      image: redis:alpine
      ports:
        - "6379:6379"

  volumes:
    mysql_data:
