memory_limit = 256M
  max_execution_time = 120
  max_input_time = 120
  upload_max_filesize = 100M
  post_max_size = 100M
  display_errors = Off
  log_errors = On
  error_log = /dev/stderr
  opcache.enable = 1
  opcache.memory_consumption = 128
  opcache.max_accelerated_files = 10000
  opcache.validate_timestamps = 0
  date.timezone = UTC
